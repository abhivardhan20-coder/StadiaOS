name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - run: npm ci
    - run: npm run typecheck
    - run: npm run lint
    - run: npm test
    - name: Upload coverage reports to Codecov
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
